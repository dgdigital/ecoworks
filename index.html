<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ecoskin Stage 3 - Details</title>
<style>
  :root {
    --bg: rgb(0, 46, 54);
    --text: #ffffff;
    --text-secondary: rgb(128, 150, 154);
    --accent: #5eff9c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
  }
  #app {
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-columns: 1fr 360px;
    grid-template-rows: 1fr auto;
  }
  #canvas-wrap {
    position: relative;
    grid-column: 1 / 2; grid-row: 1 / 2;
    overflow: hidden;
  }
  canvas { display: block; }
  canvas.hovering { cursor: pointer; }

  #info-panel {
    grid-column: 2 / 3; grid-row: 1 / 3;
    padding: 32px 28px;
    border-left: 1px solid rgba(128, 150, 154, 0.2);
    display: flex; flex-direction: column; gap: 16px;
    overflow-y: auto;
  }
  .eyebrow {
    color: var(--accent); font-size: 12px;
    font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #info-panel h2 { margin: 0; font-size: 22px; line-height: 1.25; }
  #info-panel p { margin: 0; color: var(--text-secondary); font-size: 15px; line-height: 1.5; }
  #info-extras { display: flex; flex-direction: column; gap: 16px; margin-top: 8px; }
  #info-extras .extra-item { display: flex; flex-direction: column; gap: 16px; }
  #info-extras h3 { margin: 0; font-size: 22px; font-weight: 600; line-height: 1.25; color: var(--text); }
  #info-extras p { margin: 0; color: var(--text-secondary); font-size: 15px; line-height: 1.5; }

  #controls {
    grid-column: 1 / 2; grid-row: 2 / 3;
    padding: 16px 24px 24px;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  button.action {
    background: var(--accent); color: var(--bg);
    border: none; padding: 12px 22px;
    font-size: 15px; font-weight: 600;
    border-radius: 999px; cursor: pointer;
    transition: opacity 150ms;
  }
  button.action:hover { opacity: 0.85; }
  button.ghost {
    background: transparent; color: var(--text);
    border: 1px solid rgba(128, 150, 154, 0.4);
    padding: 12px 18px; font-size: 14px;
    border-radius: 999px; cursor: pointer;
  }
  button.ghost:hover { border-color: var(--accent); }

  #look-toggle {
    position: absolute; top: 20px; right: 20px; z-index: 10;
    display: flex;
    background: rgba(0, 46, 54, 0.7);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(128, 150, 154, 0.3);
    border-radius: 999px; padding: 4px;
  }
  #look-toggle button {
    background: transparent; color: var(--text-secondary);
    border: none; padding: 8px 16px;
    font-size: 13px; border-radius: 999px;
    cursor: pointer; transition: all 150ms;
  }
  #look-toggle button.active {
    background: var(--accent); color: var(--bg); font-weight: 600;
  }

  .hint { color: var(--text-secondary); font-size: 13px; margin-left: auto; }

  @media (max-width: 800px) {
    #app { grid-template-columns: 1fr; grid-template-rows: 1fr auto auto; }
    #canvas-wrap { grid-column: 1; grid-row: 1; }
    #controls    { grid-column: 1; grid-row: 2; padding: 12px 16px; }
    #info-panel  {
      grid-column: 1; grid-row: 3;
      border-left: none;
      border-top: 1px solid rgba(128, 150, 154, 0.2);
      padding: 20px 16px 24px; max-height: 40vh;
    }
    .hint { display: none; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="canvas-wrap">
    <div id="look-toggle">
      <button id="look-iso" class="active">Isometrisch</button>
      <button id="look-real">3D-Look</button>
    </div>
  </div>
  <div id="controls">
    <button id="btn-expand" class="action">Aufbau zeigen</button>
    <button id="btn-reset"  class="ghost">Ansicht zurücksetzen</button>
    <span class="hint">Ziehen zum Drehen</span>
  </div>
  <aside id="info-panel">
    <div class="eyebrow">Fassadenaufbau</div>
    <h2 id="info-title">ecoskin – Schichtaufbau</h2>
    <p id="info-text">Klicken Sie auf <span style="color: var(--accent);">"Aufbau zeigen"</span>, um die einzelnen Schichten zu erkunden.</p>
    <div id="info-extras"></div>
  </aside>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
//  TEXTS
// ============================================================
const LAYER_TEXTS = [
  { title: 'Ausgleichsdämmung',           text: 'Mineralwolle zur Wärmedämmung und zum Toleranzausgleich. Stellt eine lückenlose Verbindung zur Bestandswand her.' },
  { title: 'Beplankung',                  text: 'Robuste Gipsfaserplatte zur statischen Aussteifung. Dient als Barriere für Brand- und Schallschutz.' },
  { title: 'Holzrahmen + Gefachdämmung',  text: 'Tragwerk aus Holzständern, Schwelle und Rähm. Gefach mit Mineralwolle gefüllt.' },
  { title: 'Fassadenbahn',                text: 'Wetterfeste, diffusionsoffene Membran. Sorgt für Winddichtigkeit.' },
  { title: 'Hinterlüftung',               text: 'Tragsystem mit Hohlraum für Luftzirkulation, Feuchtigkeitsabfuhr und Hitzeschutz.' },
  {
    title: 'Fassadenbekleidung',
    text: 'Schützt vor Witterung und bestimmt das architektonische Erscheinungsbild. Konfigurierbar aus Faserzement oder Holz.',
    extras: [
      { title: 'Fenster', text: 'Werksseitig im Fassadenmodul integrierte Fenstereinheiten. Optional und je nach Bedarf mit integriertem Sonnenschutz.' },
      { title: 'Lüfter',  text: 'Kompakte Einheit für automatischen Luftaustausch und Feuchteregulierung. Spart durch hocheffiziente Wärmerückgewinnung zusätzlich Heizenergie.' }
    ]
  }
];

// ============================================================
//  COLORS aus SVGs
// ============================================================
const C = {
  bg:         0x002e36,
  edge:       0x002e36,
  // Layer 1
  l1:         0xd9eddf,
  // Layer 2
  l2:         0x4d787a,
  // Layer 3
  l3_fill:    0xdeecdf,
  l3_frame:   0x3e797b,  // dunkles türkis-grün wie im SVG (cls-9)
  // Layer 4
  l4:         0x64989a,
  // Layer 5
  l5:         0x3e797b,
  // Layer 6
  l6_main:    0x5dff9c,
  l6_dark:    0x4d787a,
  l6_rolladen:0x1b4950,
  l6_glass:   0xf4f4f4,
  l6_lamelle: 0x4d787a
};

// Wand-Maße in Meter (1 Three.js-Einheit = 1 Meter)
const LAYER_W = 6.9;
const LAYER_H = 2.7;
// Layer-Dicken in mm (umgerechnet zu Metern für Three.js)
const LAYER_DEFS = [
  { thickness: 0.098,  builder: 'mineralwolle' },   // Ausgleichsdämmung 98mm
  { thickness: 0.0125, builder: 'beplankung' },     // Beplankung 12.5mm
  { thickness: 0.160,  builder: 'holzrahmen' },     // Holzrahmen 160mm
  { thickness: 0.0005, builder: 'membran' },        // Fassadenbahn 0.5mm
  { thickness: 0.040,  builder: 'hinterlueftung' }, // Hinterlüftung 40mm
  { thickness: 0.022,  builder: 'bekleidung' }      // Bekleidung 22mm
];

const COLLAPSED_GAP = 0;
const EXPANDED_GAP  = 1.1;

// ============================================================
//  LOOK MODE - bestimmt Material-Typ
// ============================================================
let lookMode = 'iso';

// ============================================================
//  GLOBALE FENSTER-DEFINITION
//  Das Fenster geht durch ALLE Schichten 1-6 durch.
//  Die echten Maße: 94cm × 114cm, Position rechts unter der Mitte.
// ============================================================
const WIN = {
  W: 0.94,
  H: 1.14,
  X: 1.97,   // Mitte zwischen Ständer 5 (1.48) und Ständer 6 (2.45)
  Y: -0.1
};
const WIN_LEFT  = WIN.X - WIN.W/2;
const WIN_RIGHT = WIN.X + WIN.W/2;
const WIN_TOP   = WIN.Y + WIN.H/2;
const WIN_BOT   = WIN.Y - WIN.H/2;

// Lüfter-Position (rechts vom Fenster, oben)
const VENT = {
  W: 0.42, H: 0.28,
  X: WIN.X + WIN.W/2 + 0.6,
  Y: WIN.Y + WIN.H/2 - 0.12
};
const VENT_LEFT  = VENT.X - VENT.W/2;
const VENT_RIGHT = VENT.X + VENT.W/2;
const VENT_TOP   = VENT.Y + VENT.H/2;
const VENT_BOT   = VENT.Y - VENT.H/2;

// Baut eine Wand-Schicht als EINZELNES Mesh mit Fenster- und Lüfter-Aussparungen.
// Optional kann die Wand und/oder die Löcher um einen Inset verkleinert/vergrößert werden,
// um Z-Fighting mit anderen Elementen zu vermeiden.
function makeWallWithHoles(thickness, color, opts = {}) {
  const insetX = opts.insetX || 0;
  const insetY = opts.insetY || 0;
  const winInset = opts.winInset || 0;
  const ventInset = opts.ventInset || 0;

  // Wand-Outline (Shape) - eventuell verkleinert
  const shape = new THREE.Shape();
  shape.moveTo(-LAYER_W/2 + insetX, -LAYER_H/2 + insetY);
  shape.lineTo( LAYER_W/2 - insetX, -LAYER_H/2 + insetY);
  shape.lineTo( LAYER_W/2 - insetX,  LAYER_H/2 - insetY);
  shape.lineTo(-LAYER_W/2 + insetX,  LAYER_H/2 - insetY);
  shape.lineTo(-LAYER_W/2 + insetX, -LAYER_H/2 + insetY);

  // Fenster-Loch - eventuell etwas größer (winInset)
  const winHole = new THREE.Path();
  winHole.moveTo(WIN_LEFT - winInset,  WIN_BOT - winInset);
  winHole.lineTo(WIN_RIGHT + winInset, WIN_BOT - winInset);
  winHole.lineTo(WIN_RIGHT + winInset, WIN_TOP + winInset);
  winHole.lineTo(WIN_LEFT - winInset,  WIN_TOP + winInset);
  winHole.lineTo(WIN_LEFT - winInset,  WIN_BOT - winInset);
  shape.holes.push(winHole);

  // Lüfter-Loch - eventuell etwas größer (ventInset)
  const ventHole = new THREE.Path();
  ventHole.moveTo(VENT_LEFT - ventInset,  VENT_BOT - ventInset);
  ventHole.lineTo(VENT_RIGHT + ventInset, VENT_BOT - ventInset);
  ventHole.lineTo(VENT_RIGHT + ventInset, VENT_TOP + ventInset);
  ventHole.lineTo(VENT_LEFT - ventInset,  VENT_TOP + ventInset);
  ventHole.lineTo(VENT_LEFT - ventInset,  VENT_BOT - ventInset);
  shape.holes.push(ventHole);

  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: thickness,
    bevelEnabled: false,
    curveSegments: 1
  });
  geo.translate(0, 0, -thickness/2);

  const material = mat(color, opts);
  const mesh = new THREE.Mesh(geo, material);

  // Nur Außenkanten + Lochkanten zeigen
  const edgeOpts = lookMode === 'iso'
    ? { color: C.edge, opacity: 1 }
    : { color: 0x000000, opacity: 0.18, transparent: true };
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(geo, 30),
    new THREE.LineBasicMaterial(edgeOpts)
  );
  mesh.add(edges);

  return mesh;
}

function mat(color, opts = {}) {
  if (lookMode === 'iso') {
    return new THREE.MeshBasicMaterial({
      color,
      map: opts.map || null,  // Textur auch im iso-Modus
      transparent: opts.opacity != null && opts.opacity < 1,
      opacity: opts.opacity ?? 1
    });
  } else {
    return new THREE.MeshStandardMaterial({
      color,
      roughness: opts.roughness ?? 0.7,
      metalness: opts.metalness ?? 0.05,
      transparent: opts.opacity != null && opts.opacity < 1,
      opacity: opts.opacity ?? 1,
      map: opts.map || null
    });
  }
}

// Prozedurale Mineralwolle-Textur: kleine kantige Splitter wie im SVG
let cachedMineralTexture = null;
function getMineralTexture() {
  if (cachedMineralTexture) return cachedMineralTexture;
  const canvas = document.createElement('canvas');
  canvas.width = 1024; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  // Heller Mineralwolle-Grundton
  ctx.fillStyle = '#d9eddf';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let seed = 7;
  function rnd() { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }

  // Kleine kantige 4-5-Eck Splitter (Faser-Optik)
  function drawSplinter(cx, cy, size, fillStyle) {
    const numPoints = 4 + Math.floor(rnd() * 2);
    const pts = [];
    for (let i = 0; i < numPoints; i++) {
      const angle = (i / numPoints) * Math.PI * 2 + rnd() * 0.4;
      const r = size * (0.5 + rnd() * 0.8);
      pts.push([cx + Math.cos(angle) * r, cy + Math.sin(angle) * r]);
    }
    ctx.fillStyle = fillStyle;
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.fill();
  }

  // Weniger Splitter für ein ruhigeres, weniger füllendes Muster
  for (let i = 0; i < 140; i++) {
    drawSplinter(rnd()*canvas.width, rnd()*canvas.height, 7 + rnd()*9, '#8fb0b3');
  }
  // Vereinzelte hellere Akzent-Splitter
  for (let i = 0; i < 40; i++) {
    drawSplinter(rnd()*canvas.width, rnd()*canvas.height, 5 + rnd()*6, '#c4dad4');
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1.2, 0.5);
  if (THREE.SRGBColorSpace !== undefined) tex.colorSpace = THREE.SRGBColorSpace;
  cachedMineralTexture = tex;
  return tex;
}

// Prozedurale Gipsfaser-Textur: dunklere Splitter auf türkis
let cachedGipsTexture = null;
function getGipsTexture() {
  if (cachedGipsTexture) return cachedGipsTexture;
  const canvas = document.createElement('canvas');
  canvas.width = 1024; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#4d787a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let seed = 13;
  function rnd() { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }

  function drawSplinter(cx, cy, size, fillStyle) {
    const numPoints = 4 + Math.floor(rnd() * 2);
    const pts = [];
    for (let i = 0; i < numPoints; i++) {
      const angle = (i / numPoints) * Math.PI * 2 + rnd() * 0.4;
      const r = size * (0.5 + rnd() * 0.8);
      pts.push([cx + Math.cos(angle) * r, cy + Math.sin(angle) * r]);
    }
    ctx.fillStyle = fillStyle;
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.fill();
  }

  // Weniger Splitter für ruhigeres Muster
  for (let i = 0; i < 140; i++) {
    drawSplinter(rnd()*canvas.width, rnd()*canvas.height, 7 + rnd()*9, '#1e4548');
  }
  // Vereinzelte hellere Akzent-Splitter
  for (let i = 0; i < 40; i++) {
    drawSplinter(rnd()*canvas.width, rnd()*canvas.height, 5 + rnd()*6, '#7ba2a4');
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1.2, 0.5);
  if (THREE.SRGBColorSpace !== undefined) tex.colorSpace = THREE.SRGBColorSpace;
  cachedGipsTexture = tex;
  return tex;
}

// Prozedurale Holz-Textur (UV Plus-artiges warmes Naturholz)
let cachedWoodTexture = null;
function getWoodTexture() {
  if (cachedWoodTexture) return cachedWoodTexture;

  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 512;
  const ctx = canvas.getContext('2d');

  // Warmer Holz-Grundton
  const baseR = 178, baseG = 124, baseB = 70;

  // Hintergrund: vertikaler Gradient von leicht heller (oben) zu leicht dunkler (unten)
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, `rgb(${baseR + 12}, ${baseG + 8}, ${baseB + 5})`);
  grad.addColorStop(1, `rgb(${baseR - 15}, ${baseG - 10}, ${baseB - 8})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Maserung: feine horizontale Linien mit Variation (entspricht Holzfaser in vertikaler Schalungsrichtung)
  // Hinweis: Auf der Bekleidung sind die Lamellen horizontal, also auch die Maserung horizontal.
  let seed = 42;
  function rnd() { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }

  for (let i = 0; i < 220; i++) {
    const y = rnd() * canvas.height;
    const len = canvas.width * (0.4 + rnd() * 0.6);
    const x0 = rnd() * (canvas.width - len);
    const darkness = 0.10 + rnd() * 0.20;
    ctx.strokeStyle = `rgba(80, 50, 25, ${darkness})`;
    ctx.lineWidth = 0.4 + rnd() * 0.8;
    ctx.beginPath();
    ctx.moveTo(x0, y);
    // Leicht wellige Linie für natürliche Wirkung
    const steps = 6;
    for (let s = 1; s <= steps; s++) {
      const t = s / steps;
      const x = x0 + len * t;
      const wobble = (rnd() - 0.5) * 3;
      ctx.lineTo(x, y + wobble);
    }
    ctx.stroke();
  }

  // Helle Glanz-Lichter (subtle highlights)
  for (let i = 0; i < 60; i++) {
    const y = rnd() * canvas.height;
    const len = canvas.width * (0.2 + rnd() * 0.4);
    const x0 = rnd() * (canvas.width - len);
    ctx.strokeStyle = `rgba(230, 190, 140, ${0.06 + rnd() * 0.08})`;
    ctx.lineWidth = 0.6 + rnd() * 1.0;
    ctx.beginPath();
    ctx.moveTo(x0, y);
    ctx.lineTo(x0 + len, y);
    ctx.stroke();
  }

  // Vereinzelte Knoten / dunklere Punkte
  for (let i = 0; i < 5; i++) {
    const x = rnd() * canvas.width;
    const y = rnd() * canvas.height;
    const r = 3 + rnd() * 6;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, 'rgba(60, 35, 18, 0.55)');
    g.addColorStop(1, 'rgba(60, 35, 18, 0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1.5, 0.8);
  tex.colorSpace = THREE.SRGBColorSpace;
  cachedWoodTexture = tex;
  return tex;
}

function makeBox(w, h, d, color, opts = {}) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, mat(color, opts));
  // Edges nur im iso-Modus deutlich sichtbar
  const edgeOpts = lookMode === 'iso'
    ? { color: C.edge, opacity: 1 }
    : { color: 0x000000, opacity: 0.15, transparent: true };
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial(edgeOpts)
  );
  mesh.add(edges);
  return mesh;
}

// ============================================================
//  LAYER BUILDERS
// ============================================================

function buildMineralwolle(thickness) {
  return makeWallWithHoles(thickness, 0xffffff, { map: getMineralTexture(), roughness: 0.9 });
}

function buildBeplankung(thickness) {
  return makeWallWithHoles(thickness, 0xffffff, { map: getGipsTexture(), roughness: 0.8 });
}

function buildHolzrahmen(thickness) {
  const g = new THREE.Group();
  // Mineralwolle-Füllung sitzt INNERHALB des Holzrahmens, mit Insets damit
  // sie nicht am Außenrahmen, Sturz oder Brüstung koplanar anschlägt (kein Z-Fighting)
  g.add(makeWallWithHoles(thickness * 0.6, 0xffffff, {
    map: getMineralTexture(),
    roughness: 0.9,
    insetX: 0.07,     // 7cm vom Außenrand zurück (sitzt innerhalb der Außenpfosten)
    insetY: 0.13,     // 13cm vom Außenrand zurück (sitzt zwischen Schwelle und Rähm)
    winInset: 0.015,  // 1.5cm Loch-Erweiterung (Sturz/Brüstung ragen ins Loch)
    ventInset: 0.015
  }));

  // Holzrahmen: Schwelle/Rähm + Ständer
  const frameThick = 0.06;  // 60mm Pfosten-Dicke
  const beamH = 0.12;       // 120mm Schwelle/Rähm
  const sturzH = 0.07;      // 70mm dünner Sturz/Brüstung am Fenster

  // Oben (Rähm) - durchgehend
  const top = makeBox(LAYER_W, beamH, thickness * 1.0, C.l3_frame);
  top.position.y = LAYER_H/2 - beamH/2;
  g.add(top);
  // Unten (Schwelle) - durchgehend
  const bot = makeBox(LAYER_W, beamH, thickness * 1.0, C.l3_frame);
  bot.position.y = -LAYER_H/2 + beamH/2;
  g.add(bot);

  // 6 Innen-Ständer aus SVG (Ständer 5 + 6 sind direkt am Fenster)
  const studXs = [-2.42, -1.45, -0.47, 0.50, 1.48, 2.45];
  for (const x of studXs) {
    const stud = makeBox(frameThick, LAYER_H - beamH*2, thickness * 1.0, C.l3_frame);
    stud.position.set(x, 0, 0);
    g.add(stud);
  }
  // 2 Außen-Pfosten (Rahmen links + rechts)
  const leftPost = makeBox(frameThick, LAYER_H - beamH*2, thickness * 1.0, C.l3_frame);
  leftPost.position.set(-LAYER_W/2 + frameThick/2, 0, 0);
  g.add(leftPost);
  const rightPost = makeBox(frameThick, LAYER_H - beamH*2, thickness * 1.0, C.l3_frame);
  rightPost.position.set(LAYER_W/2 - frameThick/2, 0, 0);
  g.add(rightPost);

  // Sturz oberhalb des Fensters (dünner Querbalken zwischen Ständer 5 und 6)
  const sturzTop = makeBox(WIN.W, sturzH, thickness * 1.0, C.l3_frame);
  sturzTop.position.set(WIN.X, WIN_TOP + sturzH/2, 0);
  g.add(sturzTop);

  // Brüstung unterhalb des Fensters
  const brust = makeBox(WIN.W, sturzH, thickness * 1.0, C.l3_frame);
  brust.position.set(WIN.X, WIN_BOT - sturzH/2, 0);
  g.add(brust);

  return g;
}

function buildMembran(thickness) {
  return makeWallWithHoles(thickness, C.l4, { roughness: 0.85 });
}

function buildHinterlueftung(thickness) {
  const g = new THREE.Group();
  // Konterlattung: 6 Latten an EXAKT den gleichen Positionen wie die Holzständer in Layer 3
  // Die Latten sitzen über den Ständern (so werden sie befestigt)
  const lathW = 0.06;
  const lathXs = [-2.42, -1.45, -0.47, 0.50, 1.48, 2.45];
  for (const x of lathXs) {
    const lath = makeBox(lathW, LAYER_H * 0.96, thickness, C.l5);
    lath.position.set(x, 0, 0);
    g.add(lath);
  }
  return g;
}

function buildBekleidung(thickness) {
  const g = new THREE.Group();

  const winW = WIN.W, winH = WIN.H;
  const winX = WIN.X, winY = WIN.Y;
  const winLeft = WIN_LEFT, winRight = WIN_RIGHT;
  const winTop = WIN_TOP, winBot = WIN_BOT;

  const ventW = VENT.W, ventH = VENT.H;
  const ventX = VENT.X, ventY = VENT.Y;

  // Material-Wahl: 3D-Modus mit Holz-Textur, iso mit Brand-Grün
  let claddingColor, claddingMap;
  if (lookMode === 'real') {
    claddingColor = 0xffffff;
    claddingMap = getWoodTexture();
  } else {
    claddingColor = C.l6_main;
    claddingMap = null;
  }

  function makeCladdingBox(w, h, d, pos) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const material = mat(claddingColor, { map: claddingMap, roughness: 0.85, metalness: 0 });
    const mesh = new THREE.Mesh(geo, material);
    mesh.position.copy(pos);
    // Stulpschalung: Latte leicht kippen, Oberkante nach hinten
    // Das gibt im iso-Modus den charakteristisch angewinkelten Look
    mesh.rotation.x = -0.18; // ~10° Neigung, Top kippt nach hinten / Bottom nach vorne (Stulpschalung)
    const edgeOpts = lookMode === 'iso'
      ? { color: C.edge, opacity: 1 }
      : { color: 0x000000, opacity: 0.18, transparent: true };
    const edges = new THREE.LineSegments(
      new THREE.EdgesGeometry(geo),
      new THREE.LineBasicMaterial(edgeOpts)
    );
    mesh.add(edges);
    return mesh;
  }

  // === HOLZLAMELLEN (horizontal verlegt mit Fenster + Lüfter Aussparung) ===
  const stripeCount = 18;
  const stripeH = LAYER_H / stripeCount;
  for (let i = 0; i < stripeCount; i++) {
    const sY = -LAYER_H/2 + stripeH/2 + i * stripeH;
    const sTop = sY + stripeH/2, sBot = sY - stripeH/2;
    const cutByWindow = sTop > winBot && sBot < winTop;
    const cutByVent = sTop > VENT_BOT && sBot < VENT_TOP;

    if (!cutByWindow && !cutByVent) {
      // Volle Lamelle ohne Aussparung
      g.add(makeCladdingBox(LAYER_W, stripeH * 0.97, thickness, new THREE.Vector3(0, sY, 0)));
    } else {
      // Zerlege Lamelle in Segmente um die Aussparungen herum
      // Bestimme alle x-Bereiche die "gesetzt" sind
      const segments = [];
      let currentLeft = -LAYER_W/2;

      // Stelle Liste der Aussparungen in dieser Zeile zusammen
      const cuts = [];
      if (cutByWindow) cuts.push({ left: winLeft, right: winRight });
      if (cutByVent)   cuts.push({ left: VENT_LEFT, right: VENT_RIGHT });
      cuts.sort((a, b) => a.left - b.left);

      for (const cut of cuts) {
        if (cut.left > currentLeft + 0.02) {
          segments.push({ left: currentLeft, right: cut.left });
        }
        currentLeft = Math.max(currentLeft, cut.right);
      }
      if (currentLeft < LAYER_W/2 - 0.02) {
        segments.push({ left: currentLeft, right: LAYER_W/2 });
      }

      for (const seg of segments) {
        const w = seg.right - seg.left;
        const cx = (seg.left + seg.right) / 2;
        g.add(makeCladdingBox(w, stripeH * 0.97, thickness, new THREE.Vector3(cx, sY, 0)));
      }
    }
  }

  // === FENSTERLEIBUNG (4 dunkle Wände, ragen in die Tiefe) ===
  const lt = 0.025; // Leibungs-Dicke
  const leibungDepth = thickness * 1.5; // ragt etwas in die Tiefe
  // Oben
  const lTop = makeBox(winW + lt*2, lt, leibungDepth, C.l6_dark);
  lTop.position.set(winX, winTop + lt/2, -thickness * 0.2);
  g.add(lTop);
  // Unten (Fensterbank, etwas dicker, ragt nach außen vor)
  const lBot = makeBox(winW + lt*4, lt * 1.8, leibungDepth, C.l6_dark);
  lBot.position.set(winX, winBot - lt*0.9, -thickness * 0.2);
  g.add(lBot);
  // Links
  const lLeft = makeBox(lt, winH, leibungDepth, C.l6_dark);
  lLeft.position.set(winLeft - lt/2, winY, -thickness * 0.2);
  g.add(lLeft);
  // Rechts
  const lRight = makeBox(lt, winH, leibungDepth, C.l6_dark);
  lRight.position.set(winRight + lt/2, winY, -thickness * 0.2);
  g.add(lRight);

  // === ROLLLADEN (oben im Fenster, 4 dunkle horizontale Streifen) ===
  const rH = winH * 0.30;
  const rY = winY + winH/2 - rH/2;
  for (let i = 0; i < 4; i++) {
    const sh = rH / 4;
    const sy = rY + rH/2 - sh/2 - i * sh;
    const stripe = makeBox(winW * 0.92, sh * 0.88, thickness * 0.45, C.l6_rolladen);
    stripe.position.set(winX, sy, thickness * 0.05);
    g.add(stripe);
  }

  // === FENSTERSCHEIBE (unter Rollladen, OPAK ===
  const glass = makeBox(winW * 0.92, winH * 0.62, thickness * 0.4, C.l6_glass, {
    roughness: 0.15, metalness: 0.5
  });
  glass.position.set(winX, winY - winH * 0.18, -thickness * 0.3);
  g.add(glass);

  // === LÜFTUNGSBLENDE (Hauptfläche mit Lamellen-Optik) ===
  const ventBoxDepth = thickness * 1.0;
  const ventBox = makeBox(ventW, ventH, ventBoxDepth, C.l6_lamelle);
  ventBox.position.set(ventX, ventY, 0);
  g.add(ventBox);
  // Horizontale Lamellen auf der Vorderseite
  for (let i = 0; i < 4; i++) {
    const lamH = 0.025;
    const lamY = ventY + ventH/2 - 0.04 - i * (ventH * 0.18);
    const lam = makeBox(ventW * 0.88, lamH, thickness * 0.2, C.l6_rolladen);
    lam.position.set(ventX, lamY, thickness * 0.55);
    g.add(lam);
  }

  // === LÜFTUNGSSCHACHT (ragt aus der Wand heraus, kleines Vordach-Element) ===
  const schachtW = 0.36, schachtH = 0.08, schachtD = thickness * 0.4;
  const schacht = makeBox(schachtW, schachtH, schachtD, C.l6_dark);
  schacht.position.set(ventX, ventY + ventH/2 + schachtH/2, thickness * 0.7);
  g.add(schacht);

  return g;
}

const BUILDERS = {
  mineralwolle:  buildMineralwolle,
  beplankung:    buildBeplankung,
  holzrahmen:    buildHolzrahmen,
  membran:       buildMembran,
  hinterlueftung:buildHinterlueftung,
  bekleidung:    buildBekleidung
};

// ============================================================
//  SCENE
// ============================================================
const canvasWrap = document.getElementById('canvas-wrap');

const scene = new THREE.Scene();
scene.background = new THREE.Color(C.bg);

const camera = new THREE.PerspectiveCamera(40, canvasWrap.clientWidth / canvasWrap.clientHeight, 0.1, 200);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(canvasWrap.clientWidth, canvasWrap.clientHeight);
canvasWrap.appendChild(renderer.domElement);

// Lichter (werden in iso-Modus nicht genutzt, da MeshBasicMaterial)
const lightsGroup = new THREE.Group();
scene.add(lightsGroup);

function setupLights() {
  while (lightsGroup.children.length) lightsGroup.remove(lightsGroup.children[0]);
  if (lookMode === 'iso') return;

  // Studio-Setup (heller): gleichmäßig hell von mehreren Seiten, kaum Schatten
  lightsGroup.add(new THREE.AmbientLight(0xffffff, 0.85));
  const front = new THREE.DirectionalLight(0xffffff, 0.85);
  front.position.set(0, 2, 10);
  lightsGroup.add(front);
  const topL = new THREE.DirectionalLight(0xffffff, 0.75);
  topL.position.set(3, 10, 3);
  lightsGroup.add(topL);
  const sideL = new THREE.DirectionalLight(0xffffff, 0.5);
  sideL.position.set(8, 3, 5);
  lightsGroup.add(sideL);
  const bottom = new THREE.DirectionalLight(0xaaeecc, 0.35);
  bottom.position.set(-3, -2, 4);
  lightsGroup.add(bottom);
}

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 4;
controls.maxDistance = 60;
controls.enableZoom = false; // Scroll bleibt auf der Webseite
controls.enablePan = false;  // kein Verschieben mit Rechtsklick

// ============================================================
//  BUILD SCENE
// ============================================================
let layerGroups = [];
let isExpanded = false;
let hoveredLayerIndex = -1;
const hitBoxes = []; // unsichtbare Boxen pro Layer, nur für Raycasting

function computePositions(expanded) {
  const positions = [];
  if (expanded) {
    const total = EXPANDED_GAP * (LAYER_DEFS.length - 1);
    for (let i = 0; i < LAYER_DEFS.length; i++) positions.push(-total/2 + i * EXPANDED_GAP);
  } else {
    const thicknesses = LAYER_DEFS.map(l => l.thickness);
    const total = thicknesses.reduce((a, b) => a + b, 0);
    let cursor = -total/2;
    for (let i = 0; i < LAYER_DEFS.length; i++) {
      positions.push(cursor + thicknesses[i]/2);
      cursor += thicknesses[i];
    }
  }
  return positions;
}

function buildScene() {
  // Alte Layer entfernen
  layerGroups.forEach(g => scene.remove(g));
  layerGroups = [];
  hitBoxes.length = 0;

  const positions = computePositions(isExpanded);
  LAYER_DEFS.forEach((def, i) => {
    const wrapper = new THREE.Group();
    const built = BUILDERS[def.builder](def.thickness);
    wrapper.add(built);

    // Unsichtbare Hit-Box: füllt die volle Layer-Box, dient nur dem Raycasting
    // Damit auch Layer mit Lücken (Hinterlüftung, Holzrahmen) als ganzes hover-bar sind.
    const hitGeo = new THREE.BoxGeometry(LAYER_W, LAYER_H, def.thickness);
    const hitMat = new THREE.MeshBasicMaterial({
      visible: false,  // unsichtbar, aber für Raycast trefffähig
      side: THREE.DoubleSide
    });
    const hitBox = new THREE.Mesh(hitGeo, hitMat);
    hitBox.userData.layerIndex = i;
    hitBox.userData.isHitBox = true;
    wrapper.add(hitBox);
    hitBoxes.push(hitBox);

    wrapper.position.z = positions[i];
    wrapper.userData.layerIndex = i;
    scene.add(wrapper);
    layerGroups.push(wrapper);
  });

  // Hover-State zurücksetzen (Materialien wurden neu erstellt)
  hoveredLayerIndex = -1;
  renderer.domElement?.classList.remove('hovering');
}
buildScene();

// ============================================================
//  EXPAND/COLLAPSE
// ============================================================
let isAnimating = false;
function animateToState(expanded) {
  if (isAnimating) return;
  isAnimating = true;
  const starts = layerGroups.map(g => g.position.z);
  const targets = computePositions(expanded);
  const t0 = performance.now();
  const dur = 800;
  function ease(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }
  function tick(now) {
    const k = ease(Math.min(1, (now - t0) / dur));
    layerGroups.forEach((g, i) => g.position.z = starts[i] + (targets[i] - starts[i]) * k);
    if (k < 1) requestAnimationFrame(tick);
    else {
      isAnimating = false;
      isExpanded = expanded;
      document.getElementById('btn-expand').textContent = expanded ? 'Zusammenfügen' : 'Aufbau zeigen';
    }
  }
  requestAnimationFrame(tick);
}

// ============================================================
//  CLICK auf Layer
// ============================================================
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

// Mausposition in normalized device coordinates (-1 bis +1) umrechnen.
// Wir benutzen den canvas-Wrapper als Referenz, weil renderer.domElement
// möglicherweise nicht exakt die Wrapper-Größe hat.
function updatePointer(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  pointer.x = (x / rect.width) * 2 - 1;
  pointer.y = -(y / rect.height) * 2 + 1;
}

function showInfo(layerIndex) {
  const data = LAYER_TEXTS[layerIndex];
  document.getElementById('info-title').textContent = data.title;
  document.getElementById('info-text').textContent  = data.text;
  const extrasEl = document.getElementById('info-extras');
  extrasEl.innerHTML = '';
  if (data.extras && data.extras.length) {
    data.extras.forEach(ex => {
      const item = document.createElement('div');
      item.className = 'extra-item';
      const h3 = document.createElement('h3');
      h3.textContent = ex.title;
      const p = document.createElement('p');
      p.textContent = ex.text;
      item.appendChild(h3);
      item.appendChild(p);
      extrasEl.appendChild(item);
    });
  }
}

renderer.domElement.addEventListener('click', (e) => {
  if (!isExpanded) return;
  updatePointer(e);
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(hitBoxes, false);
  if (hits.length > 0) {
    showInfo(hits[0].object.userData.layerIndex);
  }
});

// ============================================================
//  HOVER-HIGHLIGHT
// ============================================================
// Setzt Highlight für eine Layer-Gruppe (oder alle aus mit index === -1)
function applyHighlight(layerIndex) {
  layerGroups.forEach((group, i) => {
    const isHovered = i === layerIndex;
    group.traverse(child => {
      if (!child.isMesh || !child.material) return;
      // Edge-Lines (LineSegments) überspringen
      if (child.isLineSegments) return;
      // Hit-Boxen überspringen (unsichtbar, nur für Raycasting)
      if (child.userData.isHitBox) return;

      const mat = child.material;
      if (mat.isMeshStandardMaterial) {
        // 3D-Modus: emissive für sanftes "Glow"
        if (!mat.userData.originalEmissive) {
          mat.userData.originalEmissive = mat.emissive.clone();
        }
        if (isHovered) {
          mat.emissive.setHex(0xffffff);
          mat.emissiveIntensity = 0.25;
        } else {
          mat.emissive.copy(mat.userData.originalEmissive);
          mat.emissiveIntensity = 1;
        }
      } else if (mat.isMeshBasicMaterial) {
        // iso-Modus: Farbe direkt aufhellen
        if (!mat.userData.originalColor) {
          mat.userData.originalColor = mat.color.clone();
        }
        if (isHovered) {
          // Heller machen: mit Weiß mischen
          mat.color.copy(mat.userData.originalColor).lerp(new THREE.Color(0xffffff), 0.35);
        } else {
          mat.color.copy(mat.userData.originalColor);
        }
      }
    });
  });
}

function clearHighlight() {
  if (hoveredLayerIndex !== -1) {
    applyHighlight(-1);
    hoveredLayerIndex = -1;
    renderer.domElement.classList.remove('hovering');
  }
}

renderer.domElement.addEventListener('mousemove', (e) => {
  if (!isExpanded) {
    clearHighlight();
    return;
  }
  updatePointer(e);
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(hitBoxes, false);

  let newIndex = -1;
  if (hits.length > 0) {
    newIndex = hits[0].object.userData.layerIndex;
  }

  if (newIndex !== hoveredLayerIndex) {
    hoveredLayerIndex = newIndex;
    applyHighlight(newIndex);
    renderer.domElement.classList.toggle('hovering', newIndex !== -1);
  }
});

renderer.domElement.addEventListener('mouseleave', clearHighlight);

// ============================================================
//  LOOK MODE
// ============================================================
function setLookMode(mode) {
  lookMode = mode;
  document.getElementById('look-iso').classList.toggle('active', mode === 'iso');
  document.getElementById('look-real').classList.toggle('active', mode === 'real');

  if (mode === 'iso') {
    camera.fov = 22;
    camera.position.set(24, 14, 26);
  } else {
    camera.fov = 38;
    camera.position.set(13, 7, 17);
  }
  camera.updateProjectionMatrix();
  controls.target.set(0, 0, 0);
  controls.update();

  setupLights();
  buildScene();
}

document.getElementById('look-iso').addEventListener('click', () => setLookMode('iso'));
document.getElementById('look-real').addEventListener('click', () => setLookMode('real'));

setLookMode('iso');

// ============================================================
//  BUTTONS
// ============================================================
document.getElementById('btn-expand').addEventListener('click', () => animateToState(!isExpanded));
document.getElementById('btn-reset').addEventListener('click', () => {
  if (lookMode === 'iso') camera.position.set(24, 14, 26);
  else camera.position.set(13, 7, 17);
  controls.target.set(0, 0, 0);
  controls.update();
});

// ============================================================
//  RESIZE - sowohl Window-Resize als auch Layout-Änderungen
// ============================================================
function handleResize() {
  const w = canvasWrap.clientWidth;
  const h = canvasWrap.clientHeight;
  if (w === 0 || h === 0) return;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h, true);
}
window.addEventListener('resize', handleResize);

// ResizeObserver für den Wrapper, falls Layout-Änderungen (z.B. durch Mobile-Breakpoint)
if (typeof ResizeObserver !== 'undefined') {
  new ResizeObserver(handleResize).observe(canvasWrap);
}

// Initial nochmal sizing erzwingen
handleResize();

// ============================================================
//  RENDER LOOP
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
